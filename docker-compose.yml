services:
  stac-api:
    build: .
    ports:
      - "7822:7822"
    volumes:
      - ./catalog/pasture-area.json:/app/catalog/pasture-area.json:ro
      - ./catalog/pasture-vigor.json:/app/catalog/pasture-vigor.json:ro
      - ./catalog/items_rustac.parquet:/app/catalog/items_rustac.parquet:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7822/"]
      interval: 10s
      timeout: 5s
      retries: 3

  browser:
    build: ./browser-v2
    ports:
      - "8080:80"
    environment:
      - MAPBOX_TOKEN=${MAPBOX_TOKEN:-}
    depends_on:
      - stac-api

  nginx:
    image: nginx:1.29.0-alpine
    ports:
      - "3000:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./catalog/styles:/catalog/styles:ro
    depends_on:
      - stac-api
      - browser
