server {
    listen 80;
    server_name _;
    server_tokens off;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;

    # Cache de assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Arquivos de estilo (SLD, QML) — servidos do catálogo estático
    location ~ ^/api/collections/[^/]+/styles/(.+)$ {
        alias /app/catalog/styles/$1;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Content-Disposition "attachment";
    }

    # STAC API — stac-fastapi-pgstac em 127.0.0.1:7822.
    # O uvicorn recebe --root-path=/api no entrypoint; o FastAPI emite
    # todos os hrefs já prefixados corretamente. Proxy transparente: sem
    # sub_filter, sem reescrita de body.
    #
    # O Traefik (na frente deste nginx) já insere X-Forwarded-{Proto,Port,
    # Host,For}. Por padrão o `proxy_pass` do nginx preserva esses headers
    # (proxy_pass_request_headers = on), então não sobrescrevemos — apenas
    # adicionamos X-Forwarded-Prefix, que o Traefik não conhece. Sobrescrever
    # X-Forwarded-Proto com $scheme quebraria a detecção de TLS (Traefik
    # termina TLS e fala http com o container).
    location /api/ {
        proxy_pass http://127.0.0.1:7822/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Prefix /api;
    }

    # Proxy CORS para COGs no S3
    location /cog-proxy/ {
        resolver 8.8.8.8 valid=30s ipv6=off;

        proxy_pass https://s3.lapig.iesa.ufg.br/;
        proxy_set_header Host s3.lapig.iesa.ufg.br;
        proxy_ssl_server_name on;
        proxy_ssl_name s3.lapig.iesa.ufg.br;
        proxy_buffering off;

        # CORS
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length, Accept-Ranges" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
            add_header Access-Control-Allow-Headers "Range";
            add_header Access-Control-Max-Age 86400;
            return 204;
        }
    }

    # SPA Angular (fallback). O index.html é explicitamente no-store porque
    # ele referencia bundles com hash no nome (main-XXXXXXXX.js, chunk-...).
    # Se for cacheado pelo browser, clientes que voltam depois de um deploy
    # tentam carregar bundles antigos que já não existem no servidor e veem
    # "Erro ao carregar coleções" ou SPA em branco. Bundles em si são
    # imutáveis (location acima); só o manifesto precisa ficar fresco.
    location = / {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store" always;
        try_files /index.html =404;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store" always;
    }
}
