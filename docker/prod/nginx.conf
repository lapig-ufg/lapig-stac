server {
    listen 80;
    server_name _;
    server_tokens off;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;

    # Cache de assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Arquivos de estilo (SLD, QML) — servidos do catálogo estático
    location ~ ^/api/collections/[^/]+/styles/(.+)$ {
        alias /app/catalog/styles/$1;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Content-Disposition "attachment";
    }

    # STAC API (rustac em localhost)
    location /api/ {
        proxy_pass http://127.0.0.1:7822/;
        proxy_set_header Host $host;
        proxy_set_header Accept-Encoding "";
        sub_filter_types application/json;
        sub_filter_once off;
        sub_filter '"id":"stac-server-rs"' '"id":"lapig-stac"';
    }

    # Proxy CORS para COGs no S3
    location /cog-proxy/ {
        resolver 8.8.8.8 valid=30s ipv6=off;

        proxy_pass https://s3.lapig.iesa.ufg.br/;
        proxy_set_header Host s3.lapig.iesa.ufg.br;
        proxy_ssl_server_name on;
        proxy_ssl_name s3.lapig.iesa.ufg.br;
        proxy_buffering off;

        # CORS
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length, Accept-Ranges" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
            add_header Access-Control-Allow-Headers "Range";
            add_header Access-Control-Max-Age 86400;
            return 204;
        }
    }

    # SPA Angular (fallback)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
