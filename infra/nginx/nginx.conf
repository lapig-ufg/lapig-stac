server {
    listen 80;
    server_name _;

    # Arquivos de estilo (SLD, QML) — servidos do catálogo estático
    location ~ ^/api/collections/[^/]+/styles/(.+)$ {
        alias /catalog/styles/$1;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Content-Disposition "attachment";
    }

    # STAC API (stac-fastapi-pgstac). O uvicorn recebe --root-path=/api
    # via env STAC_ROOT_PATH no entrypoint, emitindo hrefs já prefixados
    # com /api. O proxy é transparente — sem sub_filter.
    #
    # Usamos $http_host (em vez de $host) para preservar a porta do
    # listener — necessário em dev, quando o nginx escuta em :3000 e o
    # FastAPI precisa compor hrefs que incluam essa porta.
    location /api/ {
        proxy_pass http://stac-api:7822/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Em dev o nginx escuta na porta 80 dentro do container, mas o host
        # a acessa via 3000 — o ProxyHeaderMiddleware do stac-fastapi só
        # preserva a porta original se X-Forwarded-Port estiver presente.
        proxy_set_header X-Forwarded-Port 3000;
        proxy_set_header X-Forwarded-Prefix /api;
    }

    # Proxy CORS para COGs no S3
    location /cog-proxy/ {
        resolver 8.8.8.8 valid=30s ipv6=off;

        proxy_pass https://s3.lapig.iesa.ufg.br/;
        proxy_set_header Host s3.lapig.iesa.ufg.br;
        proxy_ssl_server_name on;
        proxy_ssl_name s3.lapig.iesa.ufg.br;
        proxy_buffering off;

        # CORS
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length, Accept-Ranges" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
            add_header Access-Control-Allow-Headers "Range";
            add_header Access-Control-Max-Age 86400;
            return 204;
        }
    }

    # Browser SPA
    location / {
        proxy_pass http://browser:80;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
    }
}
